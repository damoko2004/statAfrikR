name: Newsletter Release

on:
  release:
    types: [published]

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"statAfrikR <onboarding@resend.dev>\",
              \"to\": [\"$NOTIFY_EMAIL\"],
              \"subject\": \"🚀 Nouvelle version statAfrikR : $RELEASE_TAG\",
              \"html\": \"<div style='font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;'><div style='background: #00C853; padding: 20px; text-align: center;'><h1 style='color: white; margin: 0;'>📦 statAfrikR</h1><p style='color: white; margin: 5px 0;'>Nouvelle version disponible !</p></div><div style='padding: 30px; background: #f9f9f9;'><h2 style='color: #333;'>🚀 Version $RELEASE_TAG — $RELEASE_NAME</h2><p style='color: #666;'>Une nouvelle version du package R statAfrikR vient d'être publiée.</p><div style='background: white; border-left: 4px solid #00C853; padding: 15px; margin: 20px 0;'><h3 style='color: #333; margin-top: 0;'>📋 Notes de version</h3><p style='color: #555;'>$RELEASE_BODY</p></div><div style='text-align: center; margin: 30px 0;'><a href='$RELEASE_URL' style='background: #00C853; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;'>Voir la release sur GitHub</a></div><div style='margin-top: 20px;'><h3 style='color: #333;'>🔗 Liens utiles</h3><ul><li><a href='https://damoko2004.github.io/statAfrikR/'>Documentation</a></li><li><a href='https://discord.gg/x9u5sXQB2V'>Communauté Discord</a></li><li><a href='https://github.com/damoko2004/statAfrikR'>GitHub</a></li></ul></div></div><div style='background: #333; padding: 15px; text-align: center;'><p style='color: #aaa; margin: 0; font-size: 12px;'>statAfrikR — La statistique africaine en R 🌍</p></div></div>\"
            }"
